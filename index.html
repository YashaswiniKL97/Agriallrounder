<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agriallrounder</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= TOP BAR ================= -->
<div class="topbar">

<select id="langSelect" onchange="changeLang(this.value)">
<option value="en">English</option>
<option value="kn">ಕನ್ನಡ</option>
<option value="hi">हिन्दी</option>
<option value="ta">தமிழ்</option>
<option value="te">తెలుగు</option>
</select>

<h2 class="logo" onclick="homePage()">Agriallrounder</h2>

</div> <!-- ✅ CLOSE TOPBAR HERE -->

<!-- ✅ NOW ADD BELOW -->
<div class="top-actions">

<button id="orderBtn" onclick="openOrderHistory()">📦 Order History</button>

<button id="bookingBtn" onclick="openBookingHistory()">📅 Booking History</button>

<button id="trackBtn" onclick="trackOrder()">🔍 Track Order</button>

<button id="adminBtn" onclick="adminLogin()">⚙ Admin</button>

<button onclick="openCart()" class="cart-btn">
🛒 <span id="cartCount">0</span>
</button>

</div>

<!-- ================= SEARCH BAR ================= -->

<div id="mainContent">

<!-- ================= SEARCH BAR ================= -->

<div class="search-container">

<!-- ================= BANNER ================= -->

<div class="banner-slider">

<h2 class="offer-title">🔥 Best Offers for Farmers</h2>

<div class="offer-items">

<div class="offer-track">

<div class="offer-card"><img src="images/tractor.png"><p>🚜 Tractor ₹499/hr</p></div>
<div class="offer-card"><img src="images/seeds.png"><p>🌱 Seeds ₹99</p></div>
<div class="offer-card"><img src="images/fertilizer.png"><p> 20% OFF</p></div>
<div class="offer-card"><img src="images/pesticide.png"><p> Best Deals</p></div>

<!-- duplicate -->
<div class="offer-card"><img src="images/tractor.png"><p>🚜 Tractor ₹499/hr</p></div>
<div class="offer-card"><img src="images/seeds.png"><p>🌱 Seeds ₹99</p></div>
<div class="offer-card"><img src="images/fertilizer.png"><p> 20% OFF</p></div>
<div class="offer-card"><img src="images/pesticide.png"><p> Best Deals</p></div>

</div>

</div>

</div>

<!-- arrows -->

<!-- ================= BELOW BANNER ================= -->

<div class="below-banner">

  <button onclick="window.location.href='feed.html'" class="feed-btn">
🌾 Open Farmer Feed
</button>

  <input type="text" id="searchBox" placeholder="Search products...">

</div>

<!-- ================= MAIN APP CONTENT ================= -->

<div id="app" style="display:none;"></div>

<!-- ================= WHATSAPP SECTION ================= -->

<!-- ================= WHATSAPP SECTION ================= -->

<div style="text-align:center; margin:50px 20px;">

<h2 id="waTitle">📲 Order & Book via WhatsApp</h2>

<button id="waOrderBtn"
onclick="window.open('https://wa.me/918660957328?text=I want to order products')"
style="padding:12px 20px;margin:10px;background:#25D366;color:white;border:none;border-radius:10px;">
🛒 Order on WhatsApp
</button>

<br>

<button id="waBookBtn"
onclick="window.open('https://wa.me/918660957328?text=I want to book machine')"
style="padding:12px 20px;margin:10px;background:#128C7E;color:white;border:none;border-radius:10px;">
🚜 Book Machine via WhatsApp
</button>

</div>


<!-- ================= GOOGLE FORM SECTION ================= -->

<div style="text-align:center; margin:40px;">

<h2 id="formTitle">📝 Order & Booking via Google Form</h2>

<button id="orderFormBtn"
onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSei20lGx1rF4L_q-Xne8q2nEB69ygv0WBIUYFPl0v4fv9HUfg/viewform')"
style="padding:12px 20px;margin:10px;background:#1976d2;color:white;border:none;border-radius:10px;">
📝 Order via Google Form
</button>

<br>

<button id="bookingFormBtn"
onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLScVL0UZcso8FscnanyOAn4kqMO1KtaRLaR7Kch56jJt9BGyLQ/viewform')"
style="padding:12px 20px;margin:10px;background:#ef6c00;color:white;border:none;border-radius:10px;">
🚜 Book Machine via Google Form
</button>

</div>

</div> <!-- ✅ CLOSE mainContent -->

<!-- ================= BOTTOM NAV ================= -->

<div class="bottom-nav" id="mainNav">

<button id="homeBtn" onclick="homePage()">🏠 Home</button>

<button id="cartBtn" onclick="openCart()">🛒 Cart</button>

<button id="helpBtn" onclick="openHelp()">❓ Help</button>

<button id="profileBtn" onclick="openProfile()">👤 Profile</button>

</div>

<!-- ================= SCRIPT ================= -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>



</body>
</html>
