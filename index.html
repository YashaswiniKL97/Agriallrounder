<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agriallrounder</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= TOP BAR ================= -->
<div class="topbar">

<select id="langSelect" onchange="changeLang(this.value)">
<option value="en">English</option>
<option value="kn">ಕನ್ನಡ</option>
<option value="hi">हिन्दी</option>
<option value="ta">தமிழ்</option>
<option value="te">తెలుగు</option>
</select>

<h2 class="logo" onclick="homePage()">Agriallrounder</h2>


</div> <!-- ✅ CLOSE TOPBAR HERE -->

<!-- ✅ NOW ADD BELOW -->
<div class="top-actions">

<button class="btn left" onclick="openOrderHistory()">📦 Order History</button>

<button class="btn right" onclick="openBookingHistory()">📅 Booking History</button>

<button class="btn left" onclick="trackOrder()">🔍 Track Order</button>

<button class="btn right" onclick="adminLogin()">⚙ Admin</button>

<button class="btn left" onclick="openCart()">🛒 Cart</button>

</div>

<!-- ================= SEARCH BAR ================= -->

<div id="mainContent">

<!-- ================= SEARCH BAR ================= -->

<div class="search-container">

<!-- ================= BANNER ================= -->

<div class="banner-slider">

<div class="banner-slide active">

<video autoplay loop muted playsinline 
style="width:100%; height:100%; object-fit:cover;">
  <source src="images/tractor.mp4" type="video/mp4">
</video>

<div class="banner-text">
  <h2>🚜 Machines for Rent</h2>
  <p>Best tractors & tools at low price</p>
</div>

</div>

<div class="banner-slide" style="background-image:url('images/agri2.png')">
  <div class="banner-text">
    <h2>📹 Borewell Scanning</h2>
    <p>Check water level with camera service</p>
  </div>
</div>

<div class="banner-slide" style="background-image:url('images/agri3.png')">
  <div class="banner-text">
    <h2>🚁 Drone Spraying</h2>
    <p>Fast & modern farming solution</p>
  </div>
</div>

<div class="banner-slide" style="background-image:url('images/agri4.png')">
  <div class="banner-text">
    <h2>🌿 Organic Products</h2>
    <p>Healthy farming with DKC Organic</p>
  </div>
</div>
</div> <!-- ✅ CLOSE banner-slider -->

<!-- arrows -->

<!-- ================= BELOW BANNER ================= -->

<div class="below-banner">

  <button onclick="window.location.href='feed.html'" class="feed-btn">
🌾 Open Farmer Feed
</button>

  <input type="text" id="searchBox" placeholder="Search products...">

</div>

<div id="app"></div>

<!-- ================= WHATSAPP SECTION ================= -->

<!-- ================= WHATSAPP SECTION ================= -->

<div style="text-align:center; margin:60px 20px;">

<h2 id="waTitle">📲 Book via WhatsApp</h2>

<button id="waOrderBtn"
onclick="window.open('https://wa.me/918660957328?text=I want to order products')"
style="padding:14px 25px;margin:15px;background:#25D366;color:white;border:none;border-radius:30px;font-size:16px;">
🛒 Order on WhatsApp
</button>

<br>

<button id="waBookBtn"
onclick="window.open('https://wa.me/918660957328?text=I want to book machine')"
style="padding:14px 25px;margin:15px;background:#128C7E;color:white;border:none;border-radius:30px;font-size:16px;">
🚜 Book via WhatsApp
</button>

</div>


<!-- ================= GOOGLE FORM SECTION ================= -->

<!-- ================= BOTTOM NAV ================= -->

<div class="bottom-nav" id="mainNav">

<button id="homeBtn" onclick="homePage()">🏠 Home</button>

<button id="cartBtn" onclick="openCart()">🛒 Cart</button>

<button id="helpBtn" onclick="openHelp()">❓ Help</button>

<button id="profileBtn" onclick="openProfile()">👤 Profile</button>

</div>

<!-- ================= SCRIPT ================= -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>



</body>
</html>
