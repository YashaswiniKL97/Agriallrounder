<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agriallrounder</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= TOP BAR ================= -->
<div class="topbar">

<select id="langSelect" onchange="changeLang(this.value)">
<option value="en">English</option>
<option value="kn">ಕನ್ನಡ</option>
<option value="hi">हिन्दी</option>
<option value="ta">தமிழ்</option>
<option value="te">తెలుగు</option>
</select>

<h2 class="logo" onclick="homePage()">Agriallrounder</h2>

</div> <!-- ✅ CLOSE TOPBAR HERE -->

<!-- ✅ NOW ADD BELOW -->
<div class="top-actions">

<button id="orderBtn" onclick="openOrderHistory()">📦 Order History</button>

<button id="bookingBtn" onclick="openBookingHistory()">📅 Booking History</button>

<button id="trackBtn" onclick="trackOrder()">🔍 Track Order</button>

<button id="adminBtn" onclick="adminLogin()">⚙ Admin</button>

<button onclick="openCart()" class="cart-btn">
🛒 <span id="cartCount">0</span>
</button>

</div>

<!-- ================= SEARCH BAR ================= -->

<div class="search-container">

<!-- ================= BANNER ================= -->

<div class="banner-slider">

  <button class="banner-arrow left" onclick="prevSlide()">❮</button>

  <div class="banner-slides">

    <div class="banner active">
      <div class="banner-text">
        <h2>🚜 Tractor Booking @ ₹499</h2>
        <p>Best price for farmers</p>
      </div>
      <img src="images/tractor.png">
    </div>

    <div class="banner">
      <div class="banner-text">
        <h2>🌱 Seeds 20% OFF</h2>
        <p>Limited time offer</p>
      </div>
      <img src="images/seeds.png">
    </div>

    <div class="banner">
      <div class="banner-text">
        <h2>💧 Irrigation Tools</h2>
        <p>High quality products</p>
      </div>
      <img src="images/irrigation.png">
    </div>

  </div>

  <button class="banner-arrow right" onclick="nextSlide()">❯</button>

</div>

<!-- ================= BELOW BANNER ================= -->

<div class="below-banner">

  <button onclick="openFeed()" class="feed-btn">
    🌾 Open Farmer Feed
  </button>

  <input type="text" id="searchBox" placeholder="Search products...">

</div>

<!-- ================= MAIN APP CONTENT ================= -->

<div id="app"></div>

<!-- ================= WHATSAPP SECTION ================= -->

<div style="text-align:center; margin:50px 20px;">

<h2 id="waTitle"></h2>

<a id="waOrderBtn"
href="https://wa.me/918660957328?text=Hi%20I%20want%20to%20order%20from%20Agriallrounder" 
target="_blank"
style="background:#25D366;color:white;padding:12px 20px;border-radius:8px;text-decoration:none;margin:10px;display:inline-block;">
🛒 Order on WhatsApp
</a>

<a id="waBookBtn"
href="https://wa.me/918660957328?text=Hi%20I%20want%20to%20book%20a%20machine" 
target="_blank"
style="background:#007bff;color:white;padding:12px 20px;border-radius:8px;text-decoration:none;margin:10px;display:inline-block;">
🚜 Book Machine
</a>

</div>

<!-- ================= GOOGLE FORM SECTION ================= -->

<div style="text-align:center; margin:40px;">

<h2 id="formTitle"></h2>

<a id="orderFormBtn"
href="https://docs.google.com/forms/d/e/1FAIpQLSei20lGx1rF4L_q-Xne8q2nEB69ygv0WBIUYFPl0v4fv9HUfg/viewform" 
target="_blank"
style="background:#673ab7;color:white;padding:12px 20px;border-radius:8px;text-decoration:none;margin:10px;display:inline-block;">
📝 Order Form
</a>

<a id="bookingFormBtn"
href="https://docs.google.com/forms/d/e/1FAIpQLScVL0UZcso8FscnanyOAn4kqMO1KtaRLaR7Kch56jJt9BGyLQ/viewform" 
target="_blank"
style="background:#ff9800;color:white;padding:12px 20px;border-radius:8px;text-decoration:none;margin:10px;display:inline-block;">
🚜 Booking Form
</a>

</div>

<!-- ================= BOTTOM NAV ================= -->

<div class="bottom-nav">

<button id="homeBtn" onclick="homePage()">🏠 Home</button>
<button id="cartBtn" onclick="openCart()">🛒 Cart</button>
<button id="helpBtn" onclick="openHelp()">❓ Help</button>
<button onclick="openProfile()">👤 Profile</button>

</div>

<!-- ================= SCRIPT ================= -->

<script src="app.js"></script>


</body>
</html>
